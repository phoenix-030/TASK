<!doctype html>
<html>
  <head>
    <title>Document</title>
  </head>

  <body>
    <h2>Throttle Example</h2>
    <button id="btn">Click Me</button>
    <script>
      function throttle(func, delay) {
        let run;
        return function () {
          if (!isRunning) {
            func();
            run = true;
            setTimeout(() => {
              run = false;
            }, delay);
          }
        };
      }
      function sayHello() {
      console.log("clicked")
      }
      let throttled = throttle(sayHello, 2000);
      document.getElementById("btn").addEventListener("click", throttled);
    </script>
  </body>
</html>
