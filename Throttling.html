<!doctype html>
<html>
  <head>
    <title>Document</title>
  </head>
  
  <body>
    <h2>Throttle Example</h2>
    <button id="btn">Click Me</button>

    <script>
      document.getElementById("btn").addEventListener("click", throttled);
      function throttle(func, delay) {
        let run;
        return function () {
          if (!run) {
            func();
            run = true;
            setTimeout(() => {
              run = false;
            }, delay);
          }
        };
      }
      function sayHello() {
      console.log("clicked")
      }
      let throttledFunction = throttle(sayHello, 2000);
      document.getElementById("btn").addEventListener("click", throttledFunction);
    </script>
  </body>
</html>
